name: Daily Stock Pipeline

on:
  schedule:
    - cron: '0 5 * * 1-5' # 5:00 AM UTC, Mon-Fri
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Run Pipeline
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
        run: |
          # Start infrastructure via Docker Compose
          docker-compose up -d
          
          # Wait for DBs to be ready
          sleep 30
          
          # Execute the pipeline via a dedicated runner or by triggering the REST endpoint
          # For MVP, we can run a specific Spring Boot test or a main class that executes the pipeline logic
          ./mvnw spring-boot:run -Dspring-boot.run.arguments="--app.pipeline.auto-start=true"
